  <line x1="305" y1="460" x2="305" y2="488" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrow-yellow)" opacity="0.8"/>

  <!-- Remote user → Tailscale -->
  <rect x="780" y="220" width="90" height="50" rx="6" fill="#0d1117" stroke="#9b59b640" stroke-width="1"/>
  <text x="825" y="240" text-anchor="middle" font-size="9" fill="#9b59b6a0">YOU</text>
  <text x="825" y="256" text-anchor="middle" font-size="8" fill="#9b59b660">anywhere</text>
  <line x1="800" y1="270" x2="760" y2="398" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)" opacity="0.6"/>

  <!-- Legend -->
  <rect x="30" y="460" width="160" height="68" rx="6" fill="#ffffff05" stroke="#ffffff10" stroke-width="1"/>
  <text x="45" y="478" font-size="9" fill="#ffffff50" letter-spacing="2">LEGEND</text>
  <line x1="45" y1="492" x2="70" y2="492" stroke="#00ff88" stroke-width="1.5"/>
  <text x="76" y="496" font-size="8" fill="#ffffff60">honeypot traffic</text>
  <line x1="45" y1="507" x2="70" y2="507" stroke="#4da6ff" stroke-width="1.5"/>
  <text x="76" y="511" font-size="8" fill="#ffffff60">security events</text>
  <line x1="45" y1="522" x2="70" y2="522" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="76" y="526" font-size="8" fill="#ffffff60">remote VPN</text>
</svg>
