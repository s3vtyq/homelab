  <line x1="460" y1="230" x2="460" y2="288" stroke="#4da6ff" stroke-width="1.5" marker-end="url(#arrow-blue)" opacity="0.8"/>
  <text x="466" y="264" font-size="8" fill="#4da6ff70">events</text>

  <!-- Prometheus → Grafana -->
  <line x1="635" y1="288" x2="635" y2="232" stroke="#ff6b35" stroke-width="1.5" marker-end="url(#arrow-yellow)" opacity="0.8"/>
  <text x="641" y="264" font-size="8" fill="#ff6b3570">metrics</text>

